services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news
      POSTGRES_DB: news
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://news:news@postgres:5432/news
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn news_service.app:app --host 0.0.0.0 --port 8000"

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://news:news@postgres:5432/news
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A news_service.tasks.celery_app worker --loglevel=info

  beat:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://news:news@postgres:5432/news
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A news_service.tasks.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule

  tgbot:
    build: ./tgbot
    ports:
      - "8001:8001"
    env_file: tgbot/.env
    depends_on:
      app:
        condition: service_started

  db-backup:
    image: pgvector/pgvector:pg16
    environment:
      PGPASSWORD: news
    volumes:
      - ./backend/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        while true; do
          pg_dump -h postgres -U news -d news -F p -f /backups/checkpoint.sql &&
          echo \"[db-backup] checkpoint written at $$(date -u)\" ||
          echo \"[db-backup] pg_dump failed at $$(date -u)\";
          sleep 3600;
        done
      "
    restart: unless-stopped

volumes:
  pgdata:
